<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web template with p5.js</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/skeleton/2.0.4/skeleton.min.css"
        integrity="sha512-EZLkOqwILORob+p0BXZc+Vm3RgJBOe1Iq/0fiI7r/wJgzOFZMlsqTa29UEl6v6U6gsV4uIpsNZoV32YZqrCRCQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="index.css">
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.10/lib/p5.min.js"></script>
</head>

<body>
    <div class="menu-wrapper">
        <div class="burger-icon">≡</div>
        <div class="sidebar">
        </div>
    </div>
    <main>

        <div class="page" id="page1" title="Side 1">
            <div class="playerReaction" id="playerReaction">
                <div class="top" id="top"></div>
                <div class="chipContainer">
                <img src="./assets/playerChip.png" class="chipImg">
                <h1 class="chipText" id="spillerChipText">Spiller sum</h1>
                <p class="chipText2" id="playerScore">Hej</p>
                </div>
                
            </div>
           
            <div id="player">
                <div class="cards"></div>
                <span class="buttons">
                    <button id="playerDrawBtn">Hit</button>
                    <button id="playerStandBtn">Stand</button>
                </span>
            </div>
            <div id="dealer">
                <div class="cards"></div>
            </div>
            <div class="dealerReaction">
                 <div class="top" id="dealerReaction"></div>
                 <div class="chipContainer">
                <img src="./assets/dealerChip.png" class="chipImg">
                <h1 class="chipText" id="dealerChipText">Dealer sum</h1>
                <p class="chipText2" id="dealerScore">Hej</p>
                </div>
            </div>
        </div>

        <div class="page" id="page2" title="Side 2">
            <div class="left">
                <h1 id="statsScore">du fik:</h1>
                <div class="playerStats">
                 <span>
                <p  id="lossStat">tab:</p>
                <p " id="winStat">wins</p>
                <p  id="blackjackStat">blackjacks</p>
                <p id="drawStat">draws</p>
                </span>
                </div>
               
                
            </div>
            <div class="right">
                <h1 id="result"></h1>
            <button id="restartBtn">one more time</button>
            </div>
            
        </div>

        <div class="page" id="page3" title="Side 3">
        </div>

    </main>
    <script src="./index.js"></script>
</body>

</html>
